name: Flutter CI

on:
  push:
    paths-ignore:
      - 'backend/**'
      - 'README.md'
      - 'SETUP.md'
      - 'deployment_guide.md'
      - 'api_spec.md'
  pull_request:
    paths-ignore:
      - 'backend/**'
      - 'README.md'
      - 'SETUP.md'
      - 'deployment_guide.md'
      - 'api_spec.md'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Run Flutter Analyzer
        run: flutter analyze
        
      - name: Run Tests
        run: flutter test
